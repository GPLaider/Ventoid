name: GitHub Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach (e.g. v0.2.1). Leave empty on tag push."
        required: false
        type: string

permissions:
  contents: write

jobs:
  signed-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag name
        id: meta
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.VENTOID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/ventoid-release.jks"
          echo "VENTOID_RELEASE_STORE_FILE=$RUNNER_TEMP/ventoid-release.jks" >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build signed release APK and AAB
        env:
          VENTOID_RELEASE_STORE_PASSWORD: ${{ secrets.VENTOID_RELEASE_STORE_PASSWORD }}
          VENTOID_RELEASE_KEY_ALIAS: ${{ secrets.VENTOID_RELEASE_KEY_ALIAS }}
          VENTOID_RELEASE_KEY_PASSWORD: ${{ secrets.VENTOID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Package release assets
        id: assets
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          OUT="$RUNNER_TEMP/release-assets"
          mkdir -p "$OUT"
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          # AGP may emit app-release.apk when signed, or app-release-unsigned.apk when not.
          if [ ! -f "$APK" ]; then
            if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
              echo "Release APK is unsigned; signing secrets may be missing or incomplete." >&2
              exit 1
            fi
            echo "Release APK not found under app/build/outputs/apk/release/" >&2
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          cp "$APK" "$OUT/Ventoid_${VERSION}.apk"
          cp "$AAB" "$OUT/Ventoid_${VERSION}.aab"
          (
            cd "$OUT"
            sha256sum "Ventoid_${VERSION}.apk" "Ventoid_${VERSION}.aab" > SHA256SUMS.txt
          )
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          OUT="${{ steps.assets.outputs.dir }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Ventoid ${{ steps.meta.outputs.version }}" --generate-notes
          fi
          gh release upload "$TAG" \
            "$OUT/Ventoid_${{ steps.meta.outputs.version }}.apk" \
            "$OUT/Ventoid_${{ steps.meta.outputs.version }}.aab" \
            "$OUT/SHA256SUMS.txt" \
            --clobber
